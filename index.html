<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Flex</title>
    <link rel="stylesheet" href="./assets/styles/reset.css" />
    <link rel="stylesheet" href="./assets/styles/style.css" />
  </head>
  <body>
    <form>
      <h1>Create an account</h1>
      <p>We always keep your name and email adress private.</p>
      <div>
        <input type="text" placeholder="First name" required />
        <input type="text" placeholder="Last name" required />
      </div>
      <div>
        <input type="text" placeholder="Display Name" required />
        <input type="email" placeholder="Email Address" required />
      </div>
      <div>
        <input type="password" placeholder="Password" required />
        <input type="password" placeholder="Password Confirmation" required />
      </div>
      <div class="radio-container">
        <input type="radio" name="radio" id="buyer" checked />
        <div>
          <label for="buyer">Join As a Buyer</label>
          <p>
            I am looking for a Name, Logo or Tagline for my busyness, brand or
            product
          </p>
        </div>
      </div>
      <div class="radio-container">
        <input type="radio" name="radio" id="seller" />
        <div>
          <label for="seller">Join As a Creative or Marketplace Seller</label>
          <p>
            I plan to submit name ideas, Logo designs or sell names in Domain
            Marketplace
          </p>
        </div>
      </div>
      <div class="checkbox-container">
        <input type="checkbox" id="allow" />
        <label for="allow">
          Allow Squadhelp to send marketing/promotional offers from time to time
        </label>
      </div>
      <input type="submit" value="Create account" />
    </form>
  </body>
</html>
